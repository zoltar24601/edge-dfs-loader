name: EDGE DFS Daily Loader

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  load-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install node-fetch

      - name: Backfill results
        run: node scripts/results-backfill.js

      - name: Load hitter data
        run: node scripts/hitter-loader.js

      - name: Load pitcher data
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "7" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            node scripts/pitcher-loader.js
          else
            echo "Skipping pitcher loader (not Sunday)"
          fi
