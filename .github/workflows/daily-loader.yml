name: EDGE DFS Daily Loader

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  load-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Clear old hitter data
        run: node scripts/clear-hitters.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Run hitter loader
        run: node scripts/hitter-loader.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Run pitcher loader (weekly - Sundays only)
        if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
        run: node scripts/pitcher-loader.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
